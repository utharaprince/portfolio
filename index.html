<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uthara Prince | Portfolio</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for browser-side JSX compilation -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Public+Sans:wght@300;400;700&display=swap');
        
        body { 
            font-family: 'Public Sans', sans-serif; 
            background-color: #F5F2ED;
            color: #2D241E;
        }

        h1, h2, h3, h4, .nav-brand {
            font-family: 'Cormorant Garamond', serif;
        }

        .fade-in { animation: fadeIn 1s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        html { scroll-behavior: smooth; }
        .hero-bg-container {
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            overflow: hidden;
        }
        /* Custom scrollbar for espresso theme */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #F5F2ED; }
        ::-webkit-scrollbar-thumb { background: #8D7B68; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Custom Icon Component to handle Lucide in browser
        const Icon = ({ name, size = 24, strokeWidth = 2, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const RESUME_URL = "Resume_Uthara.pdf";
        const PROFILE_IMAGE_URL = "photo.jpeg";

        const App = () => {
            const [activeSection, setActiveSection] = useState('home');
            const [scrolled, setScrolled] = useState(false);

            const navItems = [
                { label: 'About', id: 'education' },
                { label: 'Projects', id: 'projects' },
                { label: 'Contact', id: 'contact' }
            ];

            useEffect(() => {
                const handleScroll = () => {
                    setScrolled(window.scrollY > 20);
                    const sections = ['home', 'education', 'about', 'projects', 'contact'];
                    const current = sections.find(section => {
                        const element = document.getElementById(section);
                        if (element) {
                            const rect = element.getBoundingClientRect();
                            return rect.top <= 160 && rect.bottom >= 160;
                        }
                        return false;
                    });
                    if (current) {
                        setActiveSection(current === 'about' ? 'education' : current);
                    }
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollTo = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    const offset = 70;
                    window.scrollTo({ top: element.offsetTop - offset, behavior: 'smooth' });
                }
            };

            const openGmail = () => {
                window.open('https://mail.google.com/mail/?view=cm&fs=1&to=prince.uthara@edu.em-lyon.com', '_blank');
            };

            const education = [
                {
                    degree: "Master's in Management (Grande Ecole)",
                    institution: "Emlyon Business School",
                    location: "Lyon, France",
                    year: "Sept 2025 - Present",
                    description: "Two-year programme specializing in global business strategy and organizational leadership."
                },
                {
                    degree: "Bachelor of Technology in Computer Science Engineering",
                    institution: "TKM College of Engineering, APJAKTU",
                    location: "Kollam, India",
                    year: "Aug 2018 - June 2022",
                    description: "1st Class with Distinction (GPA: 8.59/10). Focused on Computer Science, Machine Learning, NLP, and Data Science."
                }
            ];

            const experience = [
                {
                    role: "Programmer Analyst - QA Testing",
                    company: "Cognizant Technology Solutions",
                    location: "India",
                    year: "2022 - 2024",
                    description: "End-to-end testing for medical insurance applications. Developed automation scripts using Selenium and ensured API reliability via Postman."
                }
            ];

            const skills = {
                business: ["Managerial", "Leadership", "Communication", "Strategic Planning", "Project Management"],
                technical: ["Tableau", "Power BI", "Excel (TOSA advanced)", "Python", "R", "Jira", "Software Testing", "SQL"]
            };

            const hobbies = ["Photography", "Traveling", "Reading"];

            const projects = [
                {
                    title: "Tableau Sales Dashboard",
                    description: "Created a comprehensive dashboard to visualize customer loyalty and engagement metrics.",
                    tags: ["Tableau", "Data Analytics", "KPIs"],
                    icon: "bar-chart-3",
                    link: "https://public.tableau.com/app/profile/uthara.prince/viz/Saleswb/SalesDashboard",
                    status: "Completed"
                },
                {
                    title: "Power BI Analytics Dashboard",
                    description: "Working on developing a comprehensive analytics dashboard using Power BI.",
                    tags: ["Power BI", "Data Analytics", "KPIs"],
                    icon: "lock",
                    link: "#",
                    status: "In Progress"
                }
            ];

            return (
                <div className="min-h-screen bg-[#F5F2ED] text-[#2D241E] selection:bg-[#8D7B68]/20">
                    {/* Nav */}
                    <nav className={`fixed top-0 w-full z-50 transition-all duration-300 ${scrolled ? 'bg-[#3D3028] shadow-lg py-2' : 'bg-[#3D3028] py-4'}`}>
                        <div className="max-w-6xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => scrollTo('home')}>
                                <div className="nav-brand w-8 h-8 bg-white/10 border border-white/20 rounded flex items-center justify-center font-bold text-white italic">UP</div>
                            </div>
                            <div className="flex space-x-6">
                                {navItems.map(item => (
                                    <button key={item.id} onClick={() => scrollTo(item.id)} className={`text-xs uppercase tracking-[0.2em] text-white relative transition-opacity ${activeSection === item.id ? 'font-bold opacity-100' : 'opacity-70 hover:opacity-100'}`}>
                                        {item.label}
                                        {activeSection === item.id && <span className="absolute -bottom-1 left-0 w-full h-0.5 bg-[#8D7B68]"></span>}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </nav>

                    {/* Hero */}
                    <section id="home" className="relative min-h-[95vh] flex items-center justify-center overflow-hidden px-6 pt-20">
                        <div className="hero-bg-container">
                            <img src={PROFILE_IMAGE_URL} className="w-full object-cover opacity-20 grayscale" />
                            <div className="absolute inset-0 bg-gradient-to-b from-[#F5F2ED]/40 via-transparent to-[#F5F2ED]"></div>
                        </div>
                        <div className="relative z-10 text-center space-y-8 fade-in">
                            <h1 className="text-6xl md:text-[8rem] font-bold tracking-tight leading-none text-[#3D3028]">
                                UTHARA <br /> <span className="text-[#8D7B68] italic font-light">PRINCE</span>
                            </h1>
                            <p className="text-xl md:text-2xl text-[#2D241E] max-w-2xl mx-auto font-light px-4 tracking-wide">
                                Bridging Computer Science Engineering and Business Management to build data-driven solutions.
                            </p>
                            <div className="flex justify-center gap-4">
                                <button onClick={() => scrollTo('projects')} className="bg-[#3D3028] text-white px-8 py-4 rounded-full font-bold text-[10px] uppercase tracking-widest shadow-xl hover:bg-[#2D241E] transition-colors">Explore Work</button>
                                <a href={RESUME_URL} download className="bg-white text-[#3D3028] border border-[#3D3028]/10 px-8 py-4 rounded-full font-bold text-[10px] uppercase tracking-widest flex items-center gap-2 hover:bg-[#F5F2ED] transition-colors">Resume <Icon name="download" size={16} /></a>
                            </div>
                        </div>
                    </section>

                    {/* Education */}
                    <section id="education" className="py-24 px-6 bg-white/50 border-y border-[#3D3028]/5">
                        <div className="max-w-6xl mx-auto grid md:grid-cols-12 gap-16">
                            <div className="md:col-span-5 space-y-6">
                                <h2 className="text-5xl font-bold tracking-tight leading-none text-[#3D3028]">Academic <br/><span className="italic font-light">Background</span></h2>
                                <div className="w-16 h-0.5 bg-[#8D7B68]"></div>
                            </div>
                            <div className="md:col-span-7 space-y-6">
                                {education.map((edu, i) => (
                                    <div key={i} className="bg-white p-8 rounded-2xl border border-[#3D3028]/10 shadow-sm">
                                        <span className="text-[10px] font-bold text-[#8D7B68] uppercase tracking-[0.3em] block mb-2">{edu.year}</span>
                                        <h3 className="text-2xl font-bold text-[#3D3028] mb-1">{edu.degree}</h3>
                                        <p className="text-[#8D7B68] font-semibold italic text-lg">{edu.institution}</p>
                                        <p className="text-[#2D241E]/70 text-sm mt-4 leading-relaxed">{edu.description}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Experience, Skills & Hobbies */}
                    <section id="about" className="py-24 px-6 border-b border-[#3D3028]/5">
                        <div className="max-w-6xl mx-auto space-y-24">
                            {/* Professional Journey */}
                            <div className="grid md:grid-cols-12 gap-16">
                                <div className="md:col-span-5 space-y-6">
                                    <h2 className="text-5xl font-bold tracking-tight leading-none text-[#3D3028]">Professional <br/><span className="italic font-light">Journey</span></h2>
                                    <div className="w-16 h-0.5 bg-[#8D7B68]"></div>
                                </div>
                                <div className="md:col-span-7 space-y-10">
                                    {experience.map((exp, i) => (
                                        <div key={i} className="border-l border-[#8D7B68] pl-8 py-2">
                                            <div className="flex justify-between items-start mb-2">
                                                <h3 className="text-2xl font-bold text-[#3D3028]">{exp.role}</h3>
                                                <span className="text-[10px] font-bold uppercase tracking-widest text-[#8D7B68]/60 mt-2">{exp.year}</span>
                                            </div>
                                            <p className="text-[#8D7B68] font-semibold text-sm mb-4 tracking-wider uppercase">{exp.company}</p>
                                            <p className="text-[#2D241E]/70 text-sm leading-relaxed tracking-wide">{exp.description}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Core Skills */}
                            <div className="grid md:grid-cols-12 gap-16">
                                <div className="md:col-span-5 space-y-6">
                                    <h2 className="text-5xl font-bold tracking-tight leading-none text-[#3D3028]">Core <br/><span className="italic font-light">Skills</span></h2>
                                    <div className="w-16 h-0.5 bg-[#8D7B68]"></div>
                                </div>
                                <div className="md:col-span-7 grid grid-cols-1 sm:grid-cols-2 gap-12">
                                    <div className="space-y-6">
                                        <h3 className="text-[10px] font-bold uppercase tracking-[0.4em] text-[#8D7B68] border-b border-[#8D7B68]/20 pb-2">Business</h3>
                                        <div className="flex flex-wrap gap-x-6 gap-y-4">
                                            {skills.business.map((skill, i) => (
                                                <span key={i} className="text-xs font-bold text-[#3D3028] tracking-widest uppercase">{skill}</span>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="space-y-6">
                                        <h3 className="text-[10px] font-bold uppercase tracking-[0.4em] text-[#8D7B68] border-b border-[#8D7B68]/20 pb-2">Technical</h3>
                                        <div className="flex flex-wrap gap-x-6 gap-y-4">
                                            {skills.technical.map((skill, i) => (
                                                <span key={i} className="text-xs font-bold text-[#3D3028] tracking-widest uppercase">{skill}</span>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Hobbies */}
                            <div className="grid md:grid-cols-12 gap-16">
                                <div className="md:col-span-5 space-y-6">
                                    <h2 className="text-5xl font-bold tracking-tight leading-none text-[#3D3028]">Hobbies & <br/><span className="italic font-light">Interests</span></h2>
                                    <div className="w-16 h-0.5 bg-[#8D7B68]"></div>
                                </div>
                                <div className="md:col-span-7">
                                    <div className="flex flex-wrap gap-4">
                                        {hobbies.map((hobby, i) => (
                                            <div key={i} className="flex items-center gap-3 px-8 py-4 bg-white border border-[#3D3028]/5 rounded-xl shadow-sm">
                                                <div className="w-1.5 h-1.5 rounded-full bg-[#8D7B68]"></div>
                                                <span className="font-bold text-[#3D3028] text-sm tracking-widest uppercase">{hobby}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Projects Section */}
                    <section id="projects" className="py-24 px-6 bg-white/50 border-b border-[#3D3028]/5">
                        <div className="max-w-6xl mx-auto">
                            <div className="flex items-center gap-6 mb-16">
                                <h2 className="text-5xl font-bold tracking-tight text-[#3D3028]">Selected <span className="italic font-light text-[#8D7B68]">Work</span></h2>
                                <div className="flex-grow h-px bg-[#3D3028]/10"></div>
                            </div>
                            <div className="grid md:grid-cols-2 gap-12">
                                {projects.map((project, i) => (
                                    <a 
                                        key={i} 
                                        href={project.link} 
                                        target={project.link !== "#" ? "_blank" : undefined}
                                        rel="noopener noreferrer"
                                        className={`group bg-white p-12 rounded-3xl border border-[#3D3028]/10 transition-all duration-700 block ${project.link === "#" ? "cursor-default opacity-80" : "hover:shadow-2xl hover:-translate-y-1 cursor-pointer"}`}
                                    >
                                        <div className="flex justify-between items-start mb-8">
                                            <div className="w-14 h-14 bg-[#F5F2ED] rounded-xl flex items-center justify-center text-[#8D7B68] group-hover:bg-[#3D3028] group-hover:text-white transition-colors duration-500">
                                                <Icon name={project.icon} size={28} />
                                            </div>
                                            {project.status === "In Progress" && (
                                                <span className="text-[8px] font-bold tracking-[0.2em] bg-[#8D7B68]/10 text-[#8D7B68] px-3 py-1.5 rounded-full uppercase">
                                                    {project.status}
                                                </span>
                                            )}
                                        </div>
                                        <h3 className="text-3xl font-bold mb-4 text-[#3D3028]">{project.title}</h3>
                                        <p className="text-[#2D241E]/60 leading-loose text-sm mb-8 tracking-wide font-light">{project.description}</p>
                                        <div className="flex gap-4">
                                            {project.tags.map(tag => (
                                                <span key={tag} className="text-[9px] font-bold tracking-[0.3em] text-[#8D7B68] uppercase border-b border-[#8D7B68]/30 pb-0.5">{tag}</span>
                                            ))}
                                        </div>
                                    </a>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Contact */}
                    <section id="contact" className="py-32 px-6 text-center space-y-16 bg-white">
                        <div className="max-w-xl mx-auto space-y-6">
                            <h2 className="text-5xl font-bold tracking-tight text-[#3D3028]">Get In <span className="italic font-light">Touch</span></h2>
                            <p className="text-[#8D7B68] text-sm uppercase tracking-[0.4em] font-bold">Open to new projects and opportunities.</p>
                        </div>
                        <div className="flex flex-wrap justify-center gap-12">
                            <button onClick={openGmail} className="group flex flex-col items-center transition-all">
                                <div className="w-20 h-20 bg-[#F5F2ED] rounded-full flex items-center justify-center mb-4 group-hover:bg-[#3D3028] group-hover:text-white transition-all duration-500">
                                    <Icon name="mail" size={28} className="group-hover:scale-110 transition-transform" />
                                </div>
                                <span className="text-[10px] font-bold uppercase tracking-[0.3em] text-[#3D3028]">Email Me</span>
                            </button>
                            <a href="https://linkedin.com/in/utharaprince" target="_blank" className="group flex flex-col items-center transition-all">
                                <div className="w-20 h-20 bg-[#F5F2ED] rounded-full flex items-center justify-center mb-4 group-hover:bg-[#3D3028] group-hover:text-white transition-all duration-500">
                                    <Icon name="linkedin" size={28} className="group-hover:scale-110 transition-transform" />
                                </div>
                                <span className="text-[10px] font-bold uppercase tracking-[0.3em] text-[#3D3028]">LinkedIn</span>
                            </a>
                        </div>
                    </section>

                    <footer className="py-16 bg-[#1A1512] text-white/50 text-center">
                        <p className="text-[10px] font-bold uppercase tracking-[0.5em]">Uthara Prince &bull; 2026 &bull; emlyon MiM</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
